<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perspectives // An Evaluation</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-view" class="fade-element">
            <div class="progress-indicator" id="progress">01 / 06</div>
            <div class="question-text" id="question">Loading dynamic landscape...</div>
            <div class="options-stack" id="options"></div>
        </div>

        <div id="results-view" class="fade-element" style="display: none;">
            <div id="capture-zone" class="share-card">
                <div class="progress-indicator">Evaluation Complete</div>
                <div class="archetype-title" id="archetype-name">Archetype</div>
                <div class="archetype-description" id="archetype-desc">Description text...</div>
                
                <div class="metrics-panel">
                    <div class="metric-row">
                        <span id="left-metric">Landscape</span>
                        <span id="right-metric">Orientation</span>
                    </div>
                </div>
            </div>

            <button class="share-btn" onclick="generateShareImage()">Generate Story Image</button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
